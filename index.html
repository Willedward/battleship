<!DOCTYPE html>
<html lang="en">
<head>

        <h1>Welcome to Battleships</h1>
        <div class="winner_announcement">

                Human Board
            </div>
            <div class="leftside">
                
            </div>

        <div class="right_hem">

                Computer Board

            </div>

    </div>
